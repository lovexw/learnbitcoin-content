name: Notify on content push

# When content lands on main, fan out two notifications:
#   1. Cloudflare deploy hook -> rebuild learnbitcoin-web on Workers.
#   2. IndexNow -> tell Bing, Yandex, Naver, Seznam to re-crawl.
#
# Setup (one-time):
#   1. Cloudflare -> Workers & Pages -> learnbitcoin-web -> Settings ->
#      Builds -> Deploy hooks, create a hook for main. Copy URL.
#   2. This repo -> Settings -> Secrets and variables -> Actions ->
#      add CF_DEPLOY_HOOK_URL with the hook URL as the value.
#
# The IndexNow key is a public proof-of-control value (the same key
# is served at /<key>.txt on the live site). Safe to inline.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: POST to Cloudflare Pages deploy hook
        env:
          HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "CF_DEPLOY_HOOK_URL secret not set; skipping."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK_URL" -o /dev/null -w "Cloudflare: HTTP %{http_code}\n"

      - name: Notify IndexNow (Bing, Yandex, Naver, Seznam)
        run: |
          curl -fsSL -X POST https://api.indexnow.org/IndexNow \
            -H "Content-Type: application/json" \
            -w "IndexNow: HTTP %{http_code}\n" \
            -d '{
              "host": "www.learnbitcoin.com",
              "key": "8586b7edc30249992186264cbb885886",
              "keyLocation": "https://www.learnbitcoin.com/8586b7edc30249992186264cbb885886.txt",
              "urlList": [
                "https://www.learnbitcoin.com/",
                "https://www.learnbitcoin.com/sitemap-index.xml"
              ]
            }'
